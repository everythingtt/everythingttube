<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EverythingTTUBE - Watch History</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ff0000">
    <link rel="apple-touch-icon" href="social-images/youtube.png">
    <style>
        .history-container {
            max-width: 1000px;
            margin: 0 auto;
        }
        .history-item {
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
            padding: 8px;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .history-item:hover {
            background: rgba(255,255,255,0.05);
        }
        .history-thumb {
            width: 240px;
            aspect-ratio: 16/9;
            border-radius: 8px;
            object-fit: cover;
            flex-shrink: 0;
        }
        .history-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .history-info h3 {
            font-size: 18px;
            margin-bottom: 4px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .history-info p {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 4px;
        }
        .progress-container {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            margin-top: 8px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            background: var(--primary-color);
        }
        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        @media (max-width: 600px) {
            .history-item {
                flex-direction: column;
            }
            .history-thumb {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-left">
            <button id="menu-toggle" class="menu-btn" aria-label="Toggle navigation menu">
                <i class="fas fa-bars"></i>
            </button>
            <a href="index.html" class="logo">Everything<span>TTUBE</span></a>
        </div>
        <div class="search-bar">
            <input type="text" id="search-input" placeholder="Search history..." aria-label="Search">
            <button id="search-btn" aria-label="Perform search"><i class="fas fa-search"></i></button>
        </div>
        <div class="header-right">
            <div id="user-info" class="user-info-container">
                <a href="auth.html" id="login-link" class="login-link">Sign In</a>
            </div>
        </div>
    </header>

    <div class="sidebar">
        <a href="index.html"><i class="fas fa-home"></i> <span>Home</span></a>
        <a href="history.html" class="active"><i class="fas fa-history"></i> <span>History</span></a>
        <a href="studio.html"><i class="fas fa-clapperboard"></i> <span>Studio</span></a>
        <a href="upload.html"><i class="fas fa-upload"></i> <span>Upload</span></a>
        <hr style="margin: 12px 0; border: 0; border-top: 1px solid var(--border-color);">
        <div id="admin-nav" style="display: none;">
            <a href="admin.html"><i class="fas fa-user-shield"></i> <span>Admin Panel</span></a>
            <hr style="margin: 12px 0; border: 0; border-top: 1px solid var(--border-color);">
        </div>
        <a href="tokens.html"><i class="fas fa-coins"></i> <span>Monetization</span></a>
        <a href="network.html"><i class="fas fa-network-wired"></i> <span>Network</span></a>
        <a href="policies.html"><i class="fas fa-gavel"></i> <span>Policies</span></a>
    </div>

    <main>
        <div class="history-container">
            <div class="history-header">
                <h2>Watch History</h2>
                <button onclick="clearHistory()" class="action-btn" style="color: var(--primary-color); border-color: rgba(255,0,0,0.3);">
                    <i class="fas fa-trash-can"></i> Clear all history
                </button>
            </div>
            
            <div id="history-list">
                <!-- Skeleton Loaders -->
                <div class="history-item skeleton-item">
                    <div class="history-thumb skeleton"></div>
                    <div class="history-info">
                        <div class="skeleton" style="height: 20px; width: 70%; margin-bottom: 10px;"></div>
                        <div class="skeleton" style="height: 14px; width: 40%;"></div>
                    </div>
                </div>
                <div class="history-item skeleton-item">
                    <div class="history-thumb skeleton"></div>
                    <div class="history-info">
                        <div class="skeleton" style="height: 20px; width: 70%; margin-bottom: 10px;"></div>
                        <div class="skeleton" style="height: 14px; width: 40%;"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script>
        async function loadHistory() {
            const list = document.getElementById('history-list');
            try {
                const history = await API.getHistory();
                
                if (!history || history.length === 0) {
                    list.innerHTML = `
                        <div style="text-align: center; margin-top: 80px; color: var(--text-secondary);">
                            <i class="fas fa-history" style="font-size: 64px; margin-bottom: 20px; opacity: 0.3;"></i>
                            <h3>Your history is empty</h3>
                            <p>Videos you watch will appear here.</p>
                            <a href="index.html" class="primary-btn" style="display: inline-block; width: auto; margin-top: 20px; text-decoration: none;">Browse Videos</a>
                        </div>
                    `;
                    return;
                }

                list.innerHTML = history.map(item => {
                    const progress = item.duration > 0 ? (item.last_position / item.duration) * 100 : 0;
                    const thumbnail = item.thumbnail ? API.getResourceUrl('api', `/storage/thumbnails/${item.thumbnail}`) : 'https://via.placeholder.com/240x135';
                    
                    return `
                        <div class="history-item" onclick="location.href='watch.html?id=${item.video_id}'">
                            <img class="history-thumb" src="${thumbnail}" alt="${API.escapeHTML(item.title)}" loading="lazy">
                            <div class="history-info">
                                <h3>${API.escapeHTML(item.title)}</h3>
                                <p>${API.escapeHTML(item.owner_name)}</p>
                                <p>${new Date(item.updated_at).toLocaleDateString()} at ${new Date(item.updated_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</p>
                                <div class="progress-container">
                                    <div class="progress-bar" style="width: ${progress}%"></div>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (error) {
                list.innerHTML = '<p style="text-align: center; margin-top: 40px;">Error loading history. Make sure you are signed in.</p>';
            }
        }

        async function clearHistory() {
            if (confirm("Are you sure you want to clear your entire watch history? This cannot be undone.")) {
                try {
                    await API.clearHistory();
                    loadHistory();
                } catch (e) {
                    alert("Error clearing history.");
                }
            }
        }

        async function checkLogin() {
            const user = await API.getMe();
            const userInfo = document.getElementById('user-info');
            if (user && user.id) {
                userInfo.innerHTML = `
                    <div class="token-badge"><i class="fas fa-coins"></i> ${user.ett_tokens.toFixed(1)} ETT</div>
                    <a href="studio.html" style="color: white; margin-left: 15px;">${API.escapeHTML(user.username)}</a>
                    <button onclick="API.logout()" style="background: none; border: none; color: white; cursor: pointer; margin-left: 10px;">Logout</button>
                `;
                document.getElementById('admin-nav').style.display = user.is_admin ? 'block' : 'none';
            } else {
                location.href = 'auth.html';
            }
        }

        // Mobile Menu Toggle
        document.getElementById('menu-toggle').addEventListener('click', () => {
            document.querySelector('.sidebar').classList.toggle('active');
            document.querySelector('main').classList.toggle('shifted');
        });

        document.addEventListener('DOMContentLoaded', async () => {
            await DISCOVERY_PROMISE;
            checkLogin();
            loadHistory();
        });
    </script>
</body>
</html>
