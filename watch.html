<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EverythingTTUBE - Watch</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        .watch-container {
            display: flex;
            gap: 24px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .player-section {
            flex: 1;
        }
        .video-player {
            width: 100%;
            background: black;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 16px;
        }
        .video-player video {
            width: 100%;
            display: block;
        }
        .video-details {
            padding: 12px 0;
            border-bottom: 1px solid var(--border-color);
        }
        .video-details h2 {
            font-size: 20px;
            margin-bottom: 8px;
        }
        .video-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 16px;
        }
        .creator-info {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 0;
            border-bottom: 1px solid var(--border-color);
        }
        .creator-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            background: #333;
        }
        .creator-details h3 {
            font-size: 16px;
            margin-bottom: 2px;
        }
        .creator-details p {
            font-size: 12px;
            color: var(--text-secondary);
        }
        .video-description-box {
            background: #272727;
            padding: 12px;
            border-radius: 12px;
            margin-top: 16px;
            font-size: 14px;
            white-space: pre-wrap;
        }
        .banner-container {
            width: 100%;
            height: 100px;
            background: #222;
            background-size: cover;
            background-position: center;
            border-radius: 12px;
            margin-bottom: 16px;
            display: none;
        }
        .action-buttons {
            display: flex;
            gap: 12px;
        }
        .action-btn {
            background: #272727;
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .action-btn:hover {
            background: #3f3f3f;
        }
        .recommendations {
            width: 400px;
        }
        .rec-item {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            cursor: pointer;
        }
        .rec-item img {
            width: 168px;
            aspect-ratio: 16/9;
            background: #2a2a2a;
            border-radius: 8px;
            object-fit: cover;
        }
        .rec-item-info h4 {
            font-size: 14px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 4px;
        }
        .rec-item-info p {
            font-size: 12px;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <header>
        <div class="header-left">
            <a href="index.html" class="logo">Everything<span>TTUBE</span></a>
        </div>
        <div class="search-bar">
            <input type="text" placeholder="Search videos...">
            <button><i class="fas fa-search"></i></button>
        </div>
        <div class="header-right">
            <div id="user-info" class="user-info-container">
                <a href="auth.html" id="login-link" class="login-link">Sign In</a>
            </div>
        </div>
    </header>

    <main style="margin-left: 0;">
        <div class="watch-container">
            <div class="player-section">
                <div class="video-player">
                    <video id="main-video" controls autoplay>
                        <source id="video-source" src="" type="video/mp4">
                        <!-- Tracks will be added dynamically -->
                        Your browser does not support the video tag.
                    </video>
                </div>
                <div class="video-details">
                    <div id="video-hashtags" style="color: #3ea6ff; font-size: 12px; margin-bottom: 4px;"></div>
                    <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 8px;">
                        <h2 id="video-title" style="margin-bottom: 0;">Loading...</h2>
                        <span id="video-quality-badge" style="background: #333; color: #aaa; padding: 2px 6px; border-radius: 4px; font-size: 12px; font-weight: bold; display: none;"></span>
                    </div>
                    <div class="video-meta">
                        <span id="video-views">... views • ...</span>
                        <div class="action-buttons">
                            <button class="action-btn" onclick="earnEngagement()"><i class="fas fa-thumbs-up"></i> Like</button>
                            <button class="action-btn"><i class="fas fa-share"></i> Share</button>
                            <button class="action-btn" onclick="reportVideo()"><i class="fas fa-flag"></i> Report</button>
                        </div>
                    </div>
                </div>
                <div class="creator-info">
                    <img id="creator-avatar" src="https://via.placeholder.com/40" class="creator-avatar" alt="Avatar" style="cursor: pointer;">
                    <div class="creator-details">
                        <h3 id="creator-name" style="cursor: pointer;">Creator</h3>
                        <p id="creator-status">Verified</p>
                    </div>
                    <button class="action-btn" style="margin-left: auto; background: white; color: black; font-weight: bold;">Subscribe</button>
                </div>
                <div id="video-description" class="video-description-box">
                    <!-- Description will be populated here -->
                </div>
            </div>
            <div class="recommendations" id="recommendations-list">
                <!-- Related videos will be populated here -->
            </div>
        </div>
    </main>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const videoId = urlParams.get('id');

        async function loadVideoDetails() {
            if (!videoId) {
                location.href = 'index.html';
                return;
            }

            try {
                // In a real app, we'd have a getVideoById endpoint
                // For now, let's just fetch all and filter
                const videos = await API.listVideos();
                const video = videos.find(v => v.id == videoId);

                if (video) {
                    document.getElementById('video-title').textContent = video.title;
                    document.getElementById('video-views').textContent = `${video.views} views • ${new Date(video.created_at).toLocaleDateString()}`;
                    document.getElementById('video-description').textContent = video.description || 'No description provided.';
                    
                    // Populate Quality Badge
                    if (video.quality) {
                        const qBadge = document.getElementById('video-quality-badge');
                        qBadge.textContent = video.quality.toUpperCase();
                        qBadge.style.display = 'inline-block';
                        if (['1080P', '1440P'].includes(video.quality.toUpperCase())) {
                            qBadge.style.background = '#ff0000';
                            qBadge.style.color = 'white';
                        }
                    }

                    // Populate hashtags
                    if (video.hashtags) {
                        document.getElementById('video-hashtags').textContent = video.hashtags;
                    }

                    // Populate Creator Info
                    document.getElementById('creator-name').textContent = video.owner_name;
                    document.getElementById('creator-name').onclick = () => location.href = `channel.html?u=${video.owner_name}`;
                    document.getElementById('creator-avatar').onclick = () => location.href = `channel.html?u=${video.owner_name}`;
                    
                    if (video.owner_avatar) {
                        document.getElementById('creator-avatar').src = `${CONFIG.AUTH_URL}/storage/avatars/${video.owner_avatar}`;
                    }
                    
                    const streamData = await (await fetch(`${CONFIG.API_URL}/video/stream/${videoId}`)).json();
                    const videoElement = document.getElementById('main-video');
                    
                    const streamBaseUrl = streamData.type === 'hls' ? CONFIG.STREAM_URL : CONFIG.API_URL;
                    const fullStreamUrl = `${streamBaseUrl}${streamData.url}`;

                    // Handle Subtitles
                    // 1. Manual Subtitles
                    if (streamData.subtitles) {
                        const track = document.createElement('track');
                        track.kind = 'subtitles';
                        track.label = 'English (Manual)';
                        track.srclang = 'en';
                        track.src = `${CONFIG.API_URL}${streamData.subtitles}`;
                        track.default = true;
                        videoElement.appendChild(track);
                    }

                    // 2. Auto-generated Subtitles
                    if (streamData.auto_subtitles) {
                        const langNames = {
                            en: 'English (Auto)',
                            fr: 'French (Auto)',
                            ru: 'Russian (Auto)',
                            ar: 'Arabic (Auto)',
                            pt: 'Portuguese (Auto)'
                        };
                        
                        for (const [lang, filename] of Object.entries(streamData.auto_subtitles)) {
                            const track = document.createElement('track');
                            track.kind = 'subtitles';
                            track.label = langNames[lang] || lang.toUpperCase();
                            track.srclang = lang;
                            track.src = `${CONFIG.API_URL}/storage/subtitles/${filename}`;
                            videoElement.appendChild(track);
                        }
                    }

                    if (streamData.type === 'hls') {
                        if (Hls.isSupported()) {
                            const hls = new Hls();
                            hls.loadSource(fullStreamUrl);
                            hls.attachMedia(videoElement);
                        } else if (videoElement.canPlayType('application/vnd.apple.mpegurl')) {
                            // Native support (Safari)
                            videoElement.src = fullStreamUrl;
                        }
                    } else {
                        // Fallback to MP4
                        videoElement.src = fullStreamUrl;
                    }
                    
                    videoElement.play();

                    // Load recommendations from API
                    const recommendationsList = document.getElementById('recommendations-list');
                    const recs = await (await fetch(`${CONFIG.API_URL}/video/recommendations/${videoId}`)).json();
                    
                    if (recs.length === 0) {
                        recommendationsList.innerHTML = '<p style="font-size: 12px; color: var(--text-secondary);">No related videos yet.</p>';
                    } else {
                        recommendationsList.innerHTML = recs.map(v => `
                            <div class="rec-item" onclick="location.href='watch.html?id=${v.id}'">
                                <img src="${CONFIG.API_URL}/storage/thumbnails/${v.thumbnail || 'default.jpg'}" alt="${v.title}">
                                <div class="rec-item-info">
                                    <h4>${v.title}</h4>
                                    <p>${v.owner_name || 'Creator'}</p>
                                    <p>${v.views} views</p>
                                </div>
                            </div>
                        `).join('');
                    }
                }
            } catch (error) {
                console.error('Error loading video:', error);
            }
        }

        async function earnEngagement() {
            const result = await API.earnTokens('earn_engagement');
            if (result.new_balance) {
                alert(`You earned 0.1 ETT for engaging! New balance: ${result.new_balance} ETT`);
                checkLogin();
            } else {
                alert('Please sign in to earn ETT Tokens!');
            }
        }

        async function reportVideo() {
            const reason = prompt("Enter reason for reporting this video:");
            if (reason) {
                const result = await API.reportVideo(videoId, reason);
                alert(result.message || "Report submitted.");
            }
        }

        async function checkLogin() {
            const user = await API.getMe();
            const userInfo = document.getElementById('user-info');
            if (user && user.id) {
                userInfo.innerHTML = `
                    <div class="token-badge"><i class="fas fa-coins"></i> ${user.ett_tokens} ETT</div>
                    <a href="studio.html" style="color: white; margin-left: 15px;">${user.username}</a>
                    <button onclick="API.logout()" style="background: none; border: none; color: white; cursor: pointer; margin-left: 10px;">Logout</button>
                `;
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadVideoDetails();
            checkLogin();
        });
    </script>
</body>
</html>
